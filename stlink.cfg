

# 选择调试器接口：使用通用的 stlink.cfg 代替旧版的 stlink-v2.cfg
source [find interface/stlink.cfg]

# 选择传输协议：H7 系列建议直接使用 swd
transport select swd

# 选择目标芯片
source [find target/stm32h7x.cfg]

# 调试速度设定（可选，如果报错连接不稳定，可以降到 2000）
adapter speed 10000

# 复位配置：H7 芯片在烧录时通常需要特定的复位策略
# 如果后续遇到烧录失败，请取消下面这行的注释
# reset_config srst_only